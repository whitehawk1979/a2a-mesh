<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2A Mesh — Star Topology</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  #header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-size: 18px; color: #58a6ff; }
  #header .status { font-size: 13px; color: #8b949e; }
  #canvas-container { flex: 1; position: relative; }
  canvas { display: block; }
  #legend { position: absolute; bottom: 20px; right: 20px; background: #161b22cc; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; font-size: 12px; }
  #legend .item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  #legend .dot { width: 12px; height: 12px; border-radius: 50%; }
  #node-info { position: absolute; top: 20px; right: 20px; background: #161b22cc; border: 1px solid #30363d; border-radius: 8px; padding: 16px; font-size: 13px; min-width: 220px; display: none; }
  #node-info h3 { color: #58a6ff; margin-bottom: 8px; }
  #node-info .row { display: flex; justify-content: space-between; padding: 3px 0; }
  #node-info .label { color: #8b949e; }
  #refresh-btn { background: #238636; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #refresh-btn:hover { background: #2ea043; }
  .pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
</style>
</head>
<body>
<div id="header">
  <h1>⭐ A2A Mesh — Star Topology</h1>
  <div class="status" id="status-text">Connecting...</div>
  <button id="refresh-btn" onclick="fetchTopology()">⟳ Refresh</button>
</div>
<div id="canvas-container">
  <canvas id="topology-canvas"></canvas>
</div>
<div id="legend">
  <div class="item"><div class="dot" style="background:#238636"></div> P2P Connected</div>
  <div class="item"><div class="dot" style="background:#d29922"></div> P2P Backoff</div>
  <div class="item"><div class="dot" style="background:#f85149"></div> P2P Disconnected</div>
  <div class="item"><div class="dot" style="background:#58a6ff"></div> PG Transport</div>
  <div class="item"><div class="dot" style="background:#8b949e"></div> Unknown</div>
</div>
<div id="node-info"></div>

<script>
const canvas = document.getElementById('topology-canvas');
const ctx = canvas.getContext('2d');
let topologyData = null;
let nodes = [];
let connections = [];
let hoveredNode = null;
let animFrame = 0;

function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); draw(); });
resizeCanvas();

async function fetchTopology() {
  try {
    // Get auth token
    const token = localStorage.getItem('mesh_token') || '';
    const resp = await fetch('/api/mesh/topology', {
      headers: token ? { 'Authorization': 'Bearer ' + token } : {}
    });
    if (resp.status === 401) {
      document.getElementById('status-text').textContent = '⚠️ Auth required — login first';
      return;
    }
    topologyData = await resp.json();
    nodes = Object.values(topologyData.nodes || {});
    connections = topologyData.connections || [];
    document.getElementById('status-text').textContent = 
      `✅ ${nodes.length} nodes · ${connections.filter(c => c.transport === 'p2p' && c.status === 'connected').length} P2P links · ${new Date().toLocaleTimeString()}`;
    draw();
  } catch (e) {
    document.getElementById('status-text').textContent = '❌ Connection error';
    console.error(e);
  }
}

function draw() {
  if (!nodes.length) return;
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const radius = Math.min(w, h) * 0.32;

  ctx.clearRect(0, 0, w, h);

  // Calculate positions — local node in center, others in circle
  const localName = topologyData?.local_node || '';
  const localNode = nodes.find(n => n.name === localName);
  const remoteNodes = nodes.filter(n => n.name !== localName);
  const localPos = { x: cx, y: cy };
  const positions = {};
  positions[localName] = localPos;
  
  remoteNodes.forEach((node, i) => {
    const angle = (2 * Math.PI * i / remoteNodes.length) - Math.PI / 2;
    positions[node.name] = {
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle)
    };
  });

  // Draw connections
  connections.forEach(conn => {
    const from = positions[conn.source];
    const to = positions[conn.target];
    if (!from || !to) return;

    ctx.beginPath();
    if (conn.transport === 'p2p') {
      if (conn.status === 'connected') {
        ctx.strokeStyle = '#238636';
        ctx.lineWidth = 3;
        // Animated dash for active connections
        ctx.setLineDash([]);
      } else if (conn.status === 'backoff') {
        ctx.strokeStyle = '#d29922';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);
      } else {
        ctx.strokeStyle = '#f8514988';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
      }
    } else {
      // PG transport — subtle dotted line
      ctx.strokeStyle = '#58a6ff44';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 6]);
    }

    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Draw nodes
  nodes.forEach(node => {
    const pos = positions[node.name];
    if (!pos) return;

    const isLocal = node.name === localName;
    const isHovered = hoveredNode === node.name;
    const nodeRadius = isLocal ? 40 : 30;

    // Determine status color
    let color = '#8b949e'; // unknown
    if (node.status === 'online' || node.status === 'connected' || isLocal) {
      color = '#238636'; // green
    } else if (node.status === 'backoff') {
      color = '#d29922'; // yellow
    } else if (node.status === 'disconnected' || node.status === 'offline') {
      color = '#f85149'; // red
    }

    // Check P2P status from connections
    const p2pConns = connections.filter(c => 
      (c.source === node.name || c.target === node.name) && c.transport === 'p2p');
    const p2pConnected = p2pConns.some(c => c.status === 'connected');
    const p2pBackoff = p2pConns.some(c => c.status === 'backoff');
    if (p2pConnected) color = '#238636';
    else if (p2pBackoff) color = '#d29922';

    // Glow effect
    if (isLocal || isHovered) {
      const gradient = ctx.createRadialGradient(pos.x, pos.y, nodeRadius * 0.5, pos.x, pos.y, nodeRadius * 2);
      gradient.addColorStop(0, color + '44');
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, nodeRadius * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, nodeRadius, 0, Math.PI * 2);
    ctx.fillStyle = '#161b22';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = isHovered ? 4 : 2.5;
    ctx.stroke();

    // Pulsing ring for connected nodes
    if (p2pConnected || isLocal) {
      const pulseRadius = nodeRadius + 4 + 3 * Math.sin(animFrame * 0.05);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, pulseRadius, 0, Math.PI * 2);
      ctx.strokeStyle = color + '44';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Node label
    ctx.fillStyle = isHovered ? '#ffffff' : '#c9d1d9';
    ctx.font = isLocal ? 'bold 15px -apple-system' : '13px -apple-system';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.name, pos.x, pos.y);

    // Status indicator below
    ctx.font = '10px -apple-system';
    ctx.fillStyle = color;
    const statusText = isLocal ? '⭐ self' : (p2pConnected ? '🟢 p2p' : (p2pBackoff ? '🟡 backoff' : '🔴 offline'));
    ctx.fillText(statusText, pos.x, pos.y + nodeRadius + 14);

    // Capabilities (small text)
    if (isHovered && node.capabilities && node.capabilities.length) {
      const caps = node.capabilities.slice(0, 4).join(', ');
      ctx.font = '9px -apple-system';
      ctx.fillStyle = '#8b949e';
      ctx.fillText(caps, pos.x, pos.y + nodeRadius + 26);
    }
  });

  animFrame++;
}

// Animation loop
function animate() {
  draw();
  requestAnimationFrame(animate);
}

// Mouse interaction
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const localName = topologyData?.local_node || '';
  const radius = Math.min(canvas.width, canvas.height) * 0.32;
  const cx = canvas.width / 2, cy = canvas.height / 2;

  let found = null;
  nodes.forEach(node => {
    const pos = positions[node.name];
    if (!pos) return;
    const dist = Math.hypot(mx - pos.x, my - pos.y);
    const nodeRadius = node.name === localName ? 40 : 30;
    if (dist < nodeRadius + 5) found = node.name;
  });

  hoveredNode = found;
  canvas.style.cursor = found ? 'pointer' : 'default';

  // Show node info panel
  const infoEl = document.getElementById('node-info');
  if (found) {
    const node = nodes.find(n => n.name === found);
    if (node) {
      const p2pConns = connections.filter(c => 
        (c.source === found || c.target === found) && c.transport === 'p2p');
      const pgConns = connections.filter(c => 
        (c.source === found || c.target === found) && c.transport === 'pg');
      infoEl.innerHTML = `
        <h3>${node.name}</h3>
        <div class="row"><span class="label">Host:</span> ${node.host || 'unknown'}</div>
        <div class="row"><span class="label">Port:</span> ${node.port || 8650}</div>
        <div class="row"><span class="label">P2P Port:</span> ${node.p2p_port || 8645}</div>
        <div class="row"><span class="label">Role:</span> ${node.role || 'router'}</div>
        <div class="row"><span class="label">Status:</span> ${node.status || 'unknown'}</div>
        <div class="row"><span class="label">Health:</span> ${(node.health_score * 100).toFixed(0)}%</div>
        <div class="row"><span class="label">P2P Links:</span> ${p2pConns.length}</div>
        <div class="row"><span class="label">PG Links:</span> ${pgConns.length}</div>
        ${node.capabilities?.length ? `<div style="margin-top:8px;color:#8b949e">Caps: ${node.capabilities.join(', ')}</div>` : ''}
      `;
      infoEl.style.display = 'block';
    }
  } else {
    infoEl.style.display = 'none';
  }
});

// Store positions for mouse interaction
let positions = {};

// Override draw to update positions
const origDraw = draw;
draw = function() {
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const radius = Math.min(w, h) * 0.32;
  const localName = topologyData?.local_node || '';
  
  positions = {};
  positions[localName] = { x: cx, y: cy };
  const remoteNodes = nodes.filter(n => n.name !== localName);
  remoteNodes.forEach((node, i) => {
    const angle = (2 * Math.PI * i / remoteNodes.length) - Math.PI / 2;
    positions[node.name] = {
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle)
    };
  });
  origDraw();
};

// Initial load and auto-refresh
fetchTopology();
animate();
setInterval(fetchTopology, 10000); // Refresh every 10s
</script>
</body>
</html>
