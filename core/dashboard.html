<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2A Mesh Dashboard</title>
<style>
:root{--bg:#0a0e17;--surface:#131a2b;--surface2:#1a2238;--border:#2a3555;--primary:#4f8cff;--primary-dim:#2d5bb9;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 .mesh-icon{width:28px;height:28px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header-info{display:flex;gap:16px;align-items:center;font-size:13px;color:var(--text2)}
.user-badge{background:var(--primary-dim);color:var(--primary);padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;display:none;align-items:center;gap:4px}
.user-badge:hover{background:var(--primary);color:#fff}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.online{background:var(--success);box-shadow:0 0 6px var(--success)}
.status-dot.offline{background:var(--danger)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.sidebar-header .count{background:var(--primary-dim);color:var(--primary);padding:2px 8px;border-radius:10px;font-size:12px}
.agent-list{flex:1;overflow-y:auto;padding:8px}
.agent-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.agent-card:hover{border-color:var(--primary)}
.agent-card.active{border-color:var(--primary);box-shadow:0 0 8px rgba(79,140,255,.2)}
.agent-card .name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px}
.agent-card .role{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.agent-card .transports{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.transport-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--primary-dim);color:var(--primary)}
.transport-badge.inactive{background:var(--border);color:var(--text3)}
.chat-area{flex:1;display:flex;flex-direction:column}
.chat-header{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between}
.chat-header .channel{font-weight:600;font-size:15px}
.chat-header .info{font-size:12px;color:var(--text3)}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:75%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg.sent{align-self:flex-end;background:var(--primary-dim);color:var(--text);border-bottom-right-radius:4px}
.msg.received{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.broadcast{align-self:flex-start;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-bottom-left-radius:4px}
.msg .meta{font-size:11px;color:var(--text3);margin-top:4px;display:flex;gap:8px}
.msg .meta .priority{padding:1px 5px;border-radius:3px;font-size:10px}
.msg .meta .priority.p-high{background:rgba(239,68,68,.2);color:var(--danger)}
.msg .meta .priority.p-med{background:rgba(245,158,11,.2);color:var(--warning)}
.msg .meta .priority.p-low{background:rgba(34,197,94,.2);color:var(--success)}
.msg .sender{font-weight:600;font-size:12px;color:var(--primary);margin-bottom:2px}
.input-area{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:center}
.input-area input[type="text"]{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none}
.input-area input[type="text"]:focus{border-color:var(--primary)}
.input-area select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 8px;color:var(--text);font-size:13px;outline:none}
.input-area select:focus{border-color:var(--primary)}
.btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer;font-weight:500;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:active{opacity:.8}
.btn-danger{background:var(--danger)}
.btn-sm{padding:6px 12px;font-size:12px}
.right-panel{width:300px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.panel-section{border-bottom:1px solid var(--border);padding:12px 16px}
.panel-section h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--surface2);border-radius:6px;padding:8px 10px}
.stat-box .label{font-size:11px;color:var(--text3)}
.stat-box .value{font-size:18px;font-weight:700;color:var(--text)}
.stat-box .value.green{color:var(--success)}
.stat-box .value.blue{color:var(--primary)}
.stat-box .value.amber{color:var(--warning)}
/* Auth modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:400px;max-width:90vw}
.modal h2{margin-bottom:8px;font-size:20px;text-align:center}
.modal .subtitle{color:var(--text2);font-size:14px;text-align:center;margin-bottom:20px}
.modal label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px;margin-top:12px}
.modal input[type="text"],.modal input[type="password"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none}
.modal input:focus{border-color:var(--primary)}
.modal .btn{width:100%;margin-top:16px;padding:12px;font-size:15px}
.modal .switch{font-size:13px;color:var(--text2);text-align:center;margin-top:12px}
.modal .switch a{color:var(--primary);cursor:pointer;text-decoration:none}
.modal .switch a:hover{text-decoration:underline}
.modal .error{color:var(--danger);font-size:13px;text-align:center;margin-top:8px;min-height:20px}
.role-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px}
.role-badge.owner{background:rgba(245,158,11,.2);color:var(--warning)}
.role-badge.user{background:rgba(79,140,255,.2);color:var(--primary)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
.mobile-sidebar-toggle{display:none;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;margin:8px}
.sidebar-close{display:none;position:absolute;top:8px;right:8px;background:var(--border);color:var(--text);border:none;border-radius:6px;padding:4px 10px;font-size:16px;cursor:pointer}
@media(max-width:900px){
  .sidebar{position:fixed;left:-300px;top:0;height:100vh;z-index:50;transition:left .3s ease;width:280px}
  .sidebar.open{left:0}
  .sidebar-close{display:block}
  .right-panel{display:none}
  .mobile-sidebar-toggle{display:inline-flex;align-items:center;gap:6px}
  .modal{width:95vw;padding:20px}
}
</style>
</head>
<body>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <h2 id="authTitle">🤖 Bejelentkezés</h2>
    <div class="subtitle" id="authSubtitle">Add meg a felhasználóneved és jelszavad</div>
    <label for="authUsername">Felhasználónév</label>
    <input type="text" id="authUsername" placeholder="Felhasználónév..." autocomplete="username">
    <label for="authPassword">Jelszó</label>
    <input type="password" id="authPassword" placeholder="Jelszó..." autocomplete="current-password">
    <div id="authExtraFields" style="display:none">
      <label for="authDisplayName">Megjelenítendő név</label>
      <input type="text" id="authDisplayName" placeholder="Pl: Zsolt">
      <label for="authRole">Szerepkör</label>
      <select id="authRole">
        <option value="user">Felhasználó</option>
        <option value="owner">Tulajdonos</option>
      </select>
    </div>
    <button class="btn" id="authSubmitBtn" onclick="submitAuth()">Bejelentkezés</button>
    <div class="error" id="authError"></div>
    <div class="switch" id="authSwitch">Még nincs fiókod? <a onclick="switchAuthMode()">Regisztrálj</a></div>
  </div>
</div>

<!-- Main Dashboard -->
<div class="header">
  <button class="mobile-sidebar-toggle" onclick="toggleSidebar()">☰ Agentek</button>
  <h1><span class="mesh-icon">⚡</span> A2A Mesh</h1>
  <div class="header-info">
    <span><span class="status-dot online" id="statusDot"></span> <span id="nodeName">—</span></span>
    <span id="userCount">0 user</span>
    <span class="user-badge" id="userBadge" onclick="logout()"></span>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    <div class="sidebar-header">Agentek <span class="count" id="agentCount">0</span></div>
    <div class="agent-list" id="agentList">
      <div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">Betöltés...</div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <div>
        <div class="channel" id="chatChannel">📺 Mesh Broadcast</div>
        <div class="info" id="chatInfo">Minden agent látja az üzenetet</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <select id="recipientSelect"><option value="">📢 Broadcast</option></select>
      <input type="text" id="messageInput" placeholder="Üzenet írása...">
      <select id="prioritySelect">
        <option value="5">P5 Normál</option>
        <option value="7">P7 Magas</option>
        <option value="10">P10 Sürgős</option>
        <option value="1">P1 Alacsony</option>
      </select>
      <button class="btn" id="sendBtn" onclick="sendMessage()">Küldés</button>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel-section">
      <h3>Mesh Státusz</h3>
      <div class="stat-grid">
        <div class="stat-box"><div class="label">Üzenetek</div><div class="value blue" id="msgCount">0</div></div>
        <div class="stat-box"><div class="label">Agentek</div><div class="value green" id="totalAgents">0</div></div>
        <div class="stat-box"><div class="label">Local Store</div><div class="value" id="localStore">0</div></div>
        <div class="stat-box"><div class="label">P2P Peers</div><div class="value" id="p2pPeers">0</div></div>
      </div>
    </div>
    <div class="panel-section">
      <h3>Transportok</h3>
      <div class="stat-grid" id="transportGrid"></div>
    </div>
    <div class="panel-section">
      <h3>Auto-Steer</h3>
      <div class="stat-grid" id="steerGrid"></div>
    </div>
    <div class="panel-section" style="flex:1;overflow-y:auto;">
      <h3>Rendszernapló</h3>
      <div id="sysLog" style="font-size:11px;color:var(--text3);max-height:200px;overflow-y:auto;"></div>
    </div>
  </div>
</div>

<script>
var ws = null;
var nodeId = "";
var authToken = null;
var authUser = null;
var messageHistory = [];

function toggleSidebar() {
  var sb = document.getElementById("sidebar");
  sb.classList.toggle("open");
  var ov = document.getElementById("sidebarOverlay");
  if (sb.classList.contains("open")) {
    if (!ov) { ov = document.createElement("div"); ov.id = "sidebarOverlay"; ov.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:40"; ov.onclick = toggleSidebar; document.body.appendChild(ov); }
    ov.style.display = "block";
  } else {
    if (ov) ov.style.display = "none";
  }
}

function showAuth() {
  document.getElementById("authModal").style.display = "flex";
  document.getElementById("authError").textContent = "";
  var saved = localStorage.getItem("a2a_username");
  if (saved) document.getElementById("authUsername").value = saved;
  document.getElementById("authUsername").focus();
}

function switchAuthMode() {
  var isLogin = document.getElementById("authTitle").textContent.indexOf("Bejelentkez") >= 0;
  document.getElementById("authTitle").textContent = isLogin ? "🤖 Regisztráció" : "🤖 Bejelentkezés";
  document.getElementById("authSubtitle").textContent = isLogin ? "Új felhasználó létrehozása (csak owner)" : "Add meg a felhasználóneved és jelszavad";
  document.getElementById("authSubmitBtn").textContent = isLogin ? "Regisztráció" : "Bejelentkezés";
  document.getElementById("authExtraFields").style.display = isLogin ? "block" : "none";
  document.getElementById("authSwitch").innerHTML = isLogin
    ? "Már van fiókod? <a onclick=\"switchAuthMode()\">Jelentkezz be</a>"
    : "Még nincs fiókod? <a onclick=\"switchAuthMode()\">Regisztrálj</a>";
  document.getElementById("authError").textContent = "";
}

function submitAuth() {
  var username = document.getElementById("authUsername").value.trim().toLowerCase();
  var password = document.getElementById("authPassword").value;
  var errEl = document.getElementById("authError");
  errEl.textContent = "";

  if (!username || !password) { errEl.textContent = "Felhasználónév és jelszó kötelező"; return; }

  var isLogin = document.getElementById("authTitle").textContent.indexOf("Regisztráció") < 0;

  if (isLogin) {
    fetch("/api/auth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username: username, password: password})
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.error) {
        errEl.textContent = d.error;
      } else {
        authToken = d.token;
        authUser = d.user;
        localStorage.setItem("a2a_token", d.token);
        localStorage.setItem("a2a_username", d.user.username);
        document.getElementById("authModal").style.display = "none";
        document.getElementById("userBadge").style.display = "flex";
        updateUserBadge();
        initWebSocket();
        loadStatus();
        loadMessages();
        loadAgents();
      }
    }).catch(function() { errEl.textContent = "Hálózati hiba"; });
  } else {
    var displayName = document.getElementById("authDisplayName").value.trim() || username;
    var role = document.getElementById("authRole").value;
    fetch("/api/auth/register", {
      method: "POST",
      headers: {"Content-Type": "application/json", "Authorization": "Bearer " + authToken},
      body: JSON.stringify({username: username, display_name: displayName, password: password, role: role})
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.error) {
        errEl.textContent = d.error;
      } else {
        errEl.style.color = "var(--success)";
        errEl.textContent = "Felhasználó '" + d.user.username + "' sikeresen regisztrálva!";
        setTimeout(function() { errEl.style.color = ""; switchAuthMode(); }, 2000);
      }
    }).catch(function() { errEl.textContent = "Hálózati hiba"; });
  }
}

function logout() {
  var token = authToken || localStorage.getItem("a2a_token");
  if (token) {
    fetch("/api/auth/logout", {method: "POST", headers: {"Authorization": "Bearer " + token}}).catch(function() {});
  }
  authToken = null;
  authUser = null;
  localStorage.removeItem("a2a_token");
  if (ws) ws.close();
  showAuth();
}

function updateUserBadge() {
  var badge = document.getElementById("userBadge");
  if (authUser) {
    var rb = authUser.role === "owner" ? '<span class="role-badge owner">owner</span>' : '<span class="role-badge user">user</span>';
    badge.innerHTML = authUser.display_name + " " + rb + " ▾";
  }
}

function initWebSocket() {
  var proto = location.protocol === "https:" ? "wss:" : "ws:";
  var wsUrl = proto + "//" + location.host + "/ws";
  if (authToken) wsUrl += "?token=" + encodeURIComponent(authToken);
  ws = new WebSocket(wsUrl);

  ws.onopen = function() { log("WebSocket connected"); loadStatus(); loadMessages(); loadAgents(); };
  ws.onmessage = function(e) {
    var data = JSON.parse(e.data);
    switch(data.type) {
      case "connected": nodeId = data.node; document.getElementById("nodeName").textContent = data.node; break;
      case "status": updateStatus(data.data); break;
      case "new_message": addMessage(data.message); break;
      case "error": log("Hiba: " + data.message); break;
    }
  };
  ws.onclose = function() { log("WebSocket disconnected, reconnecting..."); setTimeout(initWebSocket, 3000); };
  ws.onerror = function() {};
}

function loadStatus() {
  fetch("/api/status").then(function(r) { return r.json(); }).then(function(d) { updateStatus(d); }).catch(function() {});
}

function loadMessages() {
  fetch("/api/messages?limit=100").then(function(r) { return r.json(); }).then(function(d) {
    d.messages.reverse().forEach(function(m) { addMessage(m, false); });
    scrollToBottom();
  }).catch(function() {});
}

function loadAgents() {
  fetch("/api/agents").then(function(r) { return r.json(); }).then(function(d) {
    renderAgents(d.agents);
    document.getElementById("totalAgents").textContent = d.total;
    document.getElementById("agentCount").textContent = d.total;
    var sel = document.getElementById("recipientSelect");
    sel.innerHTML = '<option value="">📢 Broadcast</option>';
    d.agents.forEach(function(a) {
      if (a.name !== nodeId) {
        var opt = document.createElement("option");
        opt.value = a.name;
        opt.textContent = "➤ " + a.name + " (" + a.role + ")";
        sel.appendChild(opt);
      }
    });
  }).catch(function() {});
}

function renderAgents(agents) {
  var list = document.getElementById("agentList");
  var html = "";
  agents.forEach(function(a) {
    var isSelf = a.name === nodeId;
    var status = (a.status === "online" || a.status === "available") ? "online" : "offline";
    var tr = a.transports || {};
    html += '<div class="agent-card ' + (isSelf ? "active" : "") + '">';
    html += '<div class="name"><span class="status-dot ' + status + '"></span>' + a.name + (isSelf ? " (te)" : "") + '</div>';
    html += '<div class="role">' + a.role + (a.host ? " · " + a.host : "") + '</div>';
    html += '<div class="transports">';
    if (tr.p2p !== undefined) html += '<span class="transport-badge ' + (tr.p2p ? "" : "inactive") + '">P2P</span>';
    if (tr.pg !== undefined) html += '<span class="transport-badge ' + (tr.pg ? "" : "inactive") + '">PG</span>';
    if (tr.http !== undefined) html += '<span class="transport-badge ' + (tr.http ? "" : "inactive") + '">HTTP</span>';
    if (tr.ble !== undefined) html += '<span class="transport-badge ' + (tr.ble ? "" : "inactive") + '">BLE</span>';
    html += '</div></div>';
  });
  list.innerHTML = html;
}

function updateStatus(data) {
  document.getElementById("msgCount").textContent = data.messages_sent || 0;
  document.getElementById("localStore").textContent = (data.local_store || {}).outbound_pending || 0;
  document.getElementById("p2pPeers").textContent = (data.peer_discovery || {}).connected_peers || 0;
  document.getElementById("userCount").textContent = ((data.dashboard || {}).connected_users || 0) + " user";

  var tr = data.transports || {};
  var inner = tr.transports || tr;
  document.getElementById("transportGrid").innerHTML =
    statBox("PG", inner.pg_notify !== undefined ? inner.pg_notify : inner.pg) +
    statBox("P2P", inner.p2p) +
    statBox("HTTP", inner.http) +
    statBox("BLE", inner.ble);

  var as = data.auto_steer || {};
  document.getElementById("steerGrid").innerHTML =
    statBox("Interrupts", as.interrupts || 0) + statBox("Queued", as.queued || 0) +
    statBox("Processed", as.processed || 0) + statBox("Backlog", as.backlog || 0);
}

function statBox(label, val) {
  if (typeof val === "object" && val !== null) {
    var avail = val.available !== undefined ? val.available : false;
    return '<div class="stat-box"><div class="label">' + label + '</div><div class="value ' + (avail ? "green" : "amber") + '">' + (avail ? "✓" : "✗") + '</div></div>';
  }
  if (typeof val === "boolean") {
    return '<div class="stat-box"><div class="label">' + label + '</div><div class="value ' + (val ? "green" : "amber") + '">' + (val ? "✓" : "✗") + '</div></div>';
  }
  return '<div class="stat-box"><div class="label">' + label + '</div><div class="value">' + val + '</div></div>';
}

function addMessage(msg, scroll) {
  if (scroll === undefined) scroll = true;
  var isSent = msg.sender === nodeId;
  var isBroadcast = !msg.recipient || msg.recipient === "broadcast";
  var cls = isSent ? "sent" : (isBroadcast ? "broadcast" : "received");
  var pri = msg.priority || 5;
  var priCls = pri >= 7 ? "p-high" : pri >= 4 ? "p-med" : "p-low";
  var priLabel = pri >= 7 ? "SÜRGŐS" : pri >= 4 ? "normál" : "alacsony";
  var senderLabel = msg.username || msg.sender || "?";
  var time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString("hu-HU") : new Date().toLocaleTimeString("hu-HU");

  var div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML =
    '<div class="sender">' + escapeHtml(senderLabel) + (isBroadcast ? " → 📢 broadcast" : " → " + escapeHtml(msg.recipient || "broadcast")) + '</div>' +
    '<div>' + escapeHtml(msg.content) + '</div>' +
    '<div class="meta">' +
      '<span>' + time + '</span>' +
      '<span class="priority ' + priCls + '">' + priLabel + '</span>' +
      (msg.source === "web_dashboard" ? '<span>🌐 web</span>' : '<span>🤖 mesh</span>') +
    '</div>';
  document.getElementById("messages").appendChild(div);
  messageHistory.push(msg);
  if (messageHistory.length > 200) messageHistory.shift();
  if (scroll) scrollToBottom();
}

function sendMessage() {
  var input = document.getElementById("messageInput");
  var content = input.value.trim();
  if (!content || !ws) return;

  ws.send(JSON.stringify({
    type: "chat",
    content: content,
    recipient: document.getElementById("recipientSelect").value,
    priority: parseInt(document.getElementById("prioritySelect").value),
  }));
  input.value = "";
}

function scrollToBottom() {
  var el = document.getElementById("messages");
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(t) { var d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

function log(msg) {
  var el = document.getElementById("sysLog");
  var time = new Date().toLocaleTimeString("hu-HU");
  el.innerHTML = '<div>[' + time + '] ' + msg + '</div>' + el.innerHTML;
}

// Auto-refresh
setInterval(loadAgents, 10000);
setInterval(loadStatus, 5000);

// Check saved token
var savedToken = localStorage.getItem("a2a_token");
if (savedToken) {
  fetch("/api/auth/me", {headers: {"Authorization": "Bearer " + savedToken}})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.user) {
        authToken = savedToken;
        authUser = d.user;
        document.getElementById("authModal").style.display = "none";
        document.getElementById("userBadge").style.display = "flex";
        updateUserBadge();
        initWebSocket();
        loadStatus();
        loadMessages();
        loadAgents();
      } else {
        localStorage.removeItem("a2a_token");
        showAuth();
      }
    }).catch(function() { showAuth(); });
} else {
  showAuth();
}

document.getElementById("authUsername").addEventListener("keydown", function(e) { if(e.key==="Enter") document.getElementById("authPassword").focus(); });
document.getElementById("authPassword").addEventListener("keydown", function(e) { if(e.key==="Enter") submitAuth(); });
document.getElementById("messageInput").addEventListener("keydown", function(e) { if(e.key==="Enter") sendMessage(); });
</script>
</body>
</html>
