mesh:
  node_name: morzsa
  node_id: ''
  transport_priority:
  - p2p
  - pg_notify
  - http
  capabilities:
  - a2a_messaging
  - file_transfer
  - p2p_transport
  - pg_transport
  - health_monitor
  - registry
  - dashboard
  - image_gen
  skills:
  - id: mesh_send
    name: Send Message
    description: Send a message to another agent or broadcast to all
    tags:
    - messaging
    - send
  - id: mesh_discover
    name: Discover Agents
    description: List all agents in the mesh and their capabilities
    tags:
    - discovery
    - agents
  - id: mesh_health
    name: Health Check
    description: Get health status and metrics of this agent
    tags:
    - health
    - monitoring
  - id: gdm
    name: Group Decision Making
    description: Coordinate multi-agent decisions with voting, consensus, and ranking
      protocols
    tags:
    - gdm
    - decision
    - voting
    - consensus
    - coordination
  - id: task_execution
    name: Task Execution
    description: Execute delegated tasks and report results back to the coordinator
    tags:
    - task
    - execution
    - delegation
  - id: image_gen
    name: Image Generation
    description: Generate images from text prompts using Pollinations.ai (Flux, Flux
      Realism, Flux Anime, Flux 3D, Turbo). Can send generated images to Telegram
      chats.
    tags:
    - image
    - generation
    - pollinations
    - telegram
  webhook_port: 8765
  webhook_secret: ${WEBHOOK_SECRET}
  telegram_chat_id: ${A2A_TELEGRAM_CHAT_ID}
  telegram_bot_token: ${A2A_TELEGRAM_BOT_TOKEN}
  telegram_auto_image: true
  log_file: ~/a2a_mesh/a2a_mesh.log
  auth_mode: open
  health_port: 8650
  transports:
    pg_notify:
      host: 192.168.1.30
      port: 5432
      dbname: agent_memory
      user: nova
      password: nova_agent_2026
      channels:
      - a2a_channel
      - a2a_steer_channel
      - delegation_channel
      - mesh_channel
    p2p:
      enabled: true
      listen_host: 0.0.0.0
      listen_port: 8645
      max_connections: 50
      idle_timeout: 300
      tls_enabled: false
    http:
      url: http://192.168.1.30:8199
      health_url: http://192.168.1.30:8198/health
      timeout: 5
      retries: 3
  discovery:
    mdns:
      enabled: true
      service: _a2a._tcp
      port: 8645
    static:
      nodes:
      - name: nova
        ip: 192.168.1.8
        p2p_port: 8645
        health_port: 8650
        transport: p2p
      - name: nova
        ip: 100.75.253.52
        p2p_port: 8645
        health_port: 8650
        transport: p2p
      - name: morzsa
        ip: 192.168.1.30
        p2p_port: 8645
        health_port: 8650
        transport: p2p
      - name: morzsa
        ip: 100.65.232.47
        p2p_port: 8645
        health_port: 8650
        transport: p2p
      - name: runa
        ip: 192.168.1.100
        p2p_port: 8645
        health_port: 8650
        transport: p2p
      - name: runa
        ip: 100.125.223.24
        p2p_port: 8645
        health_port: 8650
        transport: p2p
      - name: lennie
        ip: 192.168.1.15
        p2p_port: 8645
        health_port: 8650
        transport: p2p
      - name: lennie
        ip: 100.121.92.95
        p2p_port: 8645
        health_port: 8650
        transport: p2p
  auto_update:
    enabled: true
    check_interval: 300
    apply_automatically: true
    gitea_url: http://192.168.1.100:3001
    gitea_repo: nova/a2a-mesh
    gitea_user: zsolt
    gitea_pass: admin1234
  security:
    signing_key: ''
    trusted_keys: {}
    encryption: nacl
    transport_auth: hmac
  loop_prevention:
    self_reference_filter: true
    not_for_me_filter: true
    re_chain_limit: 4
    dedup_cache_size: 5000
    dedup_ttl: 300
  auto_steer:
    priority_threshold: 10
    queue_lower_priorities: true
  heartbeat:
    interval: 300
    warning_threshold: 300
    critical_threshold: 900
    silent_on_success: true
  topology:
    node_role: router
    routing_mode: hybrid
    max_children: 20
    max_routers: 6
    max_depth: 5
    trust_center_enabled: true
    auto_approve_known_agents: true
    allowed_public_keys: []
    enable_sleepy_end_devices: true
    message_buffer_max_size: 1000
    message_buffer_ttl_seconds: 86400
    re_association_timeout: 30
    coordinator_heartbeat_interval: 10
    enable_route_cache: true
    route_cache_ttl: 300
  topology_tuning:
    enabled: true
    check_interval: 300
    promote_threshold: 0.9
    demote_threshold: 0.3
    coordinator_threshold: 0.5
    min_observations: 10
    cooldown: 600
    auto_apply: false
plugins:
  task_dispatch:
    enabled: true
    max_concurrent_tasks: 5
    task_timeout_seconds: 300
    allowed_actions:
    - shell
    - scan
    - status
    - ping
    - custom
    require_confirmation_for:
    - shell

diagnostic:
  enabled: true
  report_interval: 300
  max_reports_stored: 100
  developer_nodes:
    - nova
  include_memory_stats: true
  include_error_patterns: true
  include_mesh_health: true
  include_performance: true
  include_config_suggestions: true
